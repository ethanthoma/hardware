name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Sync dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest test/ -v -m "not slow"
