name: pnr
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install yosys, nextpnr-ecp5
        run: sudo apt-get update && sudo apt-get install -y yosys nextpnr-ecp5
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Cache .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
      - name: Sync dependencies
        run: uv sync
      - name: P&R and report Fmax + utilization
        run: |
          {
            echo '## P&R report (ECP5 LFE5UM5G-85F, speed 8 -- eval-board part)'
            echo '`fmax` = post-route worst-case clock, `TRELLIS_COMB/FF` = LUTs/flops, `MULT18X18D` = DSP blocks'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          uv run python analysis/pnr.py | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
